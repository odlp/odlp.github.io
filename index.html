---
layout: default
title: Oliver Peate | Web Developer in London
---

<div class="content" id="projects">
  {% for project in site.data.projects %}
    <div class="unit">
      <div class="num-divider">0{{ forloop.index }}</div>
      <h2 class="title"><a href="{{ project.link }}" class="title-link">{{ project.name }}</a></h2>
      <p class="description">{{ project.description }}</p>
      <a href="{{ project.link }}"><img src="/images/{{ project.img }}" alt="{{ project.name }}" class="image" /></a>
    </div>
  {% endfor %}  
</div>
